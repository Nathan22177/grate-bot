name: Release main and deploy

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight release checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check project
        run: cargo check --locked

      - name: Check optional features
        run: cargo check --locked --all-features

      - name: Run tests
        run: cargo test --locked

      - name: Run tests with optional features
        run: cargo test --locked --all-features

  bump-version:
    name: Bump release version
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      artifact: ${{ steps.package.outputs.artifact }}
      checksum: ${{ steps.package.outputs.checksum }}
      sha: ${{ steps.package.outputs.sha }}
      tag: ${{ steps.package.outputs.tag }}
      version: ${{ steps.package.outputs.version }}

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify main has unreleased changes
        run: |
          latest_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [[ -z "${latest_tag}" ]]; then
            echo "No previous release tag found; allowing first release."
            exit 0
          fi

          if git diff --quiet "${latest_tag}..HEAD" -- Cargo.toml Cargo.lock build.rs src deploy .github/workflows; then
            echo "::error::No releasable changes found since ${latest_tag}. Refusing to bump the version and create an empty release."
            exit 1
          fi

          echo "Found changes since ${latest_tag}; continuing release."

      - name: Bump minor package version
        id: package
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          test -n "${RELEASE_PUSH_TOKEN}" || { echo "::error::RELEASE_PUSH_TOKEN secret is required for release version bump pushes"; exit 1; }
          current="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "grate-bot") | .version')"
          IFS=. read -r major minor patch_extra <<< "${current}"
          patch="${patch_extra%%[-+]*}"
          if [[ -z "${major}" || -z "${minor}" || -z "${patch}" || ! "${major}" =~ ^[0-9]+$ || ! "${minor}" =~ ^[0-9]+$ || ! "${patch}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unsupported package version: ${current}"
            exit 1
          fi

          version="${major}.$((minor + 1)).0"
          tag="v${version}"
          artifact="grate-bot-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          checksum="grate-bot-${tag}-x86_64-unknown-linux-gnu.sha256"

          if gh release view "${tag}" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Release ${tag} already exists."
            exit 1
          fi

          export CURRENT_VERSION="${current}"
          export NEW_VERSION="${version}"
          perl -0pi -e 's/(^\[package\]\nname = "grate-bot"\nversion = ")\Q$ENV{CURRENT_VERSION}\E(")/$1$ENV{NEW_VERSION}$2/m' Cargo.toml
          cargo update --workspace

          git diff --exit-code -- Cargo.toml Cargo.lock && {
            echo "::error::Version bump did not change Cargo.toml or Cargo.lock"
            exit 1
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release ${tag}"
          git remote set-url origin "https://x-access-token:${RELEASE_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main

          sha="$(git rev-parse HEAD)"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
          echo "checksum=${checksum}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"

  test-publish:
    name: test-publish
    runs-on: ubuntu-latest
    needs: bump-version
    outputs:
      artifact: ${{ needs.bump-version.outputs.artifact }}
      checksum: ${{ needs.bump-version.outputs.checksum }}
      sha: ${{ needs.bump-version.outputs.sha }}
      tag: ${{ needs.bump-version.outputs.tag }}
      version: ${{ needs.bump-version.outputs.version }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check project
        run: cargo check --locked

      - name: Check optional features
        run: cargo check --locked --all-features

      - name: Run tests
        run: cargo test --locked

      - name: Run tests with optional features
        run: cargo test --locked --all-features

      - name: Build release binary
        env:
          BUILD_COMMIT: ${{ needs.bump-version.outputs.sha }}
          BUILD_RELEASE_TAG: ${{ needs.bump-version.outputs.tag }}
          BUILD_REPOSITORY: ${{ github.repository }}
          BUILD_SOURCE_REF: main
        run: cargo build --locked --release --bin grate-bot

      - name: Package release artifact
        env:
          ARTIFACT: ${{ needs.bump-version.outputs.artifact }}
          CHECKSUM: ${{ needs.bump-version.outputs.checksum }}
          TAG: ${{ needs.bump-version.outputs.tag }}
        run: |
          mkdir -p "dist/${TAG}"
          cp target/release/grate-bot "dist/${TAG}/grate-bot"
          cp README.md "dist/${TAG}/README.md"
          cp MAINTAINER_SETUP.md "dist/${TAG}/MAINTAINER_SETUP.md"
          cp .env.example "dist/${TAG}/.env.example"
          cp -R deploy "dist/${TAG}/deploy"
          (cd "dist/${TAG}" && sha256sum grate-bot) > "dist/${CHECKSUM}"
          tar -C dist -czf "dist/${ARTIFACT}" "${TAG}"

      - name: Upload test-publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.bump-version.outputs.artifact }}
          path: |
            dist/${{ needs.bump-version.outputs.artifact }}
            dist/${{ needs.bump-version.outputs.checksum }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: test-publish

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.test-publish.outputs.artifact }}
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT: ${{ needs.test-publish.outputs.artifact }}
          CHECKSUM: ${{ needs.test-publish.outputs.checksum }}
          TAG: ${{ needs.test-publish.outputs.tag }}
          SHA: ${{ needs.test-publish.outputs.sha }}
          VERSION: ${{ needs.test-publish.outputs.version }}
        run: |
          git tag "${TAG}" "${SHA}"
          git push origin "${TAG}"
          gh release create "${TAG}" \
            "dist/${ARTIFACT}" \
            "dist/${CHECKSUM}" \
            --target "${SHA}" \
            --title "grate-bot ${VERSION}" \
            --generate-notes

  deploy:
    name: Deploy main to Linux server
    runs-on: ubuntu-latest
    needs:
      - test-publish
      - release
    environment: production

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.test-publish.outputs.artifact }}
          path: dist

      - name: Configure SSH
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "${DEPLOY_SSH_KEY}" || { echo "::error::DEPLOY_SSH_KEY secret is required"; exit 1; }
          test -n "${DEPLOY_KNOWN_HOSTS}" || { echo "::error::DEPLOY_KNOWN_HOSTS secret is required"; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release archive
        env:
          ARTIFACT: ${{ needs.test-publish.outputs.artifact }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "${DEPLOY_HOST}" || { echo "::error::DEPLOY_HOST secret is required"; exit 1; }
          test -n "${DEPLOY_USER}" || { echo "::error::DEPLOY_USER secret is required"; exit 1; }
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT}" "dist/${ARTIFACT}" "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/${ARTIFACT}"

      - name: Deploy main
        env:
          ARTIFACT: ${{ needs.test-publish.outputs.artifact }}
          DEPLOY_BRANCH: main
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_REPO_DIR: ${{ vars.DEPLOY_REPO_DIR }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "${DEPLOY_HOST}" || { echo "::error::DEPLOY_HOST secret is required"; exit 1; }
          test -n "${DEPLOY_USER}" || { echo "::error::DEPLOY_USER secret is required"; exit 1; }
          DEPLOY_REPO_DIR="$(printf '%s' "${DEPLOY_REPO_DIR}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          test -n "${DEPLOY_REPO_DIR}" || { echo "::error::DEPLOY_REPO_DIR repository variable is required"; exit 1; }
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          remote_dir="$(printf '%q' "${DEPLOY_REPO_DIR}")"
          remote_branch="$(printf '%q' "${DEPLOY_BRANCH}")"
          remote_archive="$(printf '%q' "/tmp/${ARTIFACT}")"
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${remote_dir} && BRANCH=${remote_branch} RELEASE_ARCHIVE=${remote_archive} deploy/deploy-grate-bot.sh"
