name: Deploy branch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy. Leave blank to deploy the selected workflow branch.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-branch
  cancel-in-progress: false

jobs:
  test-publish:
    name: test-publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Read package version
        id: package
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          sha="$(git rev-parse --short HEAD)"
          echo "tag=v${version}-${sha}" >> "${GITHUB_OUTPUT}"

      - name: Check formatting
        run: cargo fmt --check

      - name: Check project
        run: cargo check --locked

      - name: Check optional features
        run: cargo check --locked --all-features

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run Clippy with optional features
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Run tests with optional features
        run: cargo test --locked --all-features

      - name: Build release binary
        run: cargo build --locked --release --bin grate-bot

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

      - name: Package test-publish artifact
        env:
          TAG: ${{ steps.package.outputs.tag }}
        run: |
          mkdir -p "dist/${TAG}"
          cp target/release/grate-bot "dist/${TAG}/grate-bot"
          cp README.md "dist/${TAG}/README.md"
          cp MAINTAINER_SETUP.md "dist/${TAG}/MAINTAINER_SETUP.md"
          cp .env.example "dist/${TAG}/.env.example"
          cp -R deploy "dist/${TAG}/deploy"
          tar -C dist -czf "dist/grate-bot-${TAG}-x86_64-unknown-linux-gnu.tar.gz" "${TAG}"

      - name: Upload test-publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: grate-bot-${{ steps.package.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
          path: dist/grate-bot-${{ steps.package.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  deploy:
    name: Deploy selected branch to Linux server
    runs-on: ubuntu-latest
    needs: test-publish
    environment: production

    steps:
      - name: Configure SSH
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "${DEPLOY_SSH_KEY}" || { echo "::error::DEPLOY_SSH_KEY secret is required"; exit 1; }
          test -n "${DEPLOY_KNOWN_HOSTS}" || { echo "::error::DEPLOY_KNOWN_HOSTS secret is required"; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy branch
        env:
          DEPLOY_BRANCH: ${{ inputs.branch || github.ref_name }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_REPO_DIR: ${{ vars.DEPLOY_REPO_DIR }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "${DEPLOY_BRANCH}" || { echo "::error::No branch was selected"; exit 1; }
          test -n "${DEPLOY_HOST}" || { echo "::error::DEPLOY_HOST secret is required"; exit 1; }
          test -n "${DEPLOY_USER}" || { echo "::error::DEPLOY_USER secret is required"; exit 1; }
          DEPLOY_REPO_DIR="$(printf '%s' "${DEPLOY_REPO_DIR}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          test -n "${DEPLOY_REPO_DIR}" || { echo "::error::DEPLOY_REPO_DIR repository variable is required"; exit 1; }
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          remote_dir="$(printf '%q' "${DEPLOY_REPO_DIR}")"
          remote_branch="$(printf '%q' "${DEPLOY_BRANCH}")"
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${remote_dir} && BRANCH=${remote_branch} deploy/deploy-grate-bot.sh"
